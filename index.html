<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ofenspeicher Hero</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <section class="hero">
      <header class="hero__header">
        <div class="logo">Ofenspeicher</div>

        <nav class="nav">
          <a class="nav__link nav__link--active" href="#">Home</a>
          <a class="nav__link" href="#">Leistungen</a>
          <a class="nav__link" href="#">Öfen</a>
          <a class="nav__link" href="#">Gallerie</a>
        </nav>

        <a class="btn btn--primary" href="#">➜ Kontakt</a>
      </header>

      <div class="hero__content">
        <div class="hero__left">
          <div class="badge">Tradition<br />seit <span>1830</span></div>

          <h1>Ihr Traumofen</h1>
          <h2>für ein wohliges Zuhause</h2>
          <p>Kamine | Öfen | Planung | Schornsteinbau</p>

          <div class="hero__actions">
            <a class="btn btn--primary" href="#">➜ Ofenangebote</a>
            <a class="btn btn--ghost" href="#">➜ Kontakt</a>
          </div>
        </div>

        <div class="hero__right">
          <div class="glow"></div>
          <div class="stove-placeholder">
            <span>Bildplatzhalter<br />Ofen</span>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
