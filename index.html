<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ofenspeicher – Hero</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <section class="hero" aria-label="Hero Abschnitt Ofenspeicher">
      <header class="topbar">
        <a class="logo" href="#" aria-label="Ofenspeicher Startseite">Ofenspeicher</a>
        <nav aria-label="Hauptnavigation">
          <ul class="nav-list">
            <li><a class="active" href="#">Home</a></li>
            <li><a href="#">Leistungen</a></li>
            <li><a href="#">Ofen</a></li>
            <li><a href="#">Gallerie</a></li>
          </ul>
        </nav>
        <a class="btn btn-primary nav-cta" href="#">➜ Kontakt</a>

      <div class="hero-content">
        <div class="badge">Tradition<br />seit<br /><span>1830</span></div>

        <div class="copy">
          <h1>Ihr Traumofen</h1>
          <h2>für ein wohliges Zuhause</h2>
          <p>Kamine | Öfen | Planung | Schornsteinbau</p>

          <div class="actions">
            <a class="btn btn-primary" href="#">➜ Ofenangebote</a>
            <a class="btn btn-outline" href="#">➜ Kontakt</a>

        </div>

        <div class="stove-placeholder" role="img" aria-label="Platzhalterbild für Ofen">
          <span>Bildplatzhalter</span>
        </div>
      </div>
    </section>
