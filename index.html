<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Öfen & Referenzen</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <section class="section oeven" aria-labelledby="oefen-title">
        <p class="eyebrow">Öfen</p>
        <h1 id="oefen-title">Unsere Öfen auf einen Blick</h1>
        <p>
          Hochwertige Kamin- und Speicheröfen für ein warmes Zuhause.
        </p>
      </section>

      <section class="section referenzen" aria-labelledby="referenzen-title">
        <span class="badge">Referenzen</span>
        <h2 id="referenzen-title">Projekte die wir bereits umsetzen durften</h2>
        <div class="reference-grid" role="list" aria-label="Referenzbilder">
          <div class="placeholder" role="listitem" aria-label="Platzhalter links">
            <span>Bildplatzhalter 1</span>
          </div>
          <div class="placeholder" role="listitem" aria-label="Platzhalter mitte">
            <span>Bildplatzhalter 2</span>
          </div>
          <div class="placeholder" role="listitem" aria-label="Platzhalter rechts">
            <span>Bildplatzhalter 3</span>
          </div>
        </div>
        <button class="gallery-button" type="button">→ Zur Bildergallerie</button>
      </section>
    </main>
  </body>
</html>
